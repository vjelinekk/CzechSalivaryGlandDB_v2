name: Build

on: [pull_request]

jobs:
    build:
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}

        steps:
            - name: Check out repository code
              uses: actions/checkout@v4
            - name: Setup NodeJS
              uses: actions/setup-node@v4
              with:
                  node-version: 20
            - uses: actions/setup-python@v4
              with:
                  python-version: '3.10'
            - name: Build ML Engine (Unix)
              if: runner.os != 'Windows'
              run: |
                  cd python-ml-engine
                  pip install -r requirements.txt
                  pip install pyinstaller
                  chmod +x build.sh
                  ./build.sh
                  cd ..
                  mkdir ml_engine
                  mv python-ml-engine/dist/ml_engine ml_engine/
            - name: Build ML Engine (Windows)
              if: runner.os == 'Windows'
              shell: bash
              run: |
                  cd python-ml-engine
                  pip install -r requirements.txt
                  pip install pyinstaller
                  ./build.sh
                  cd ..
                  mkdir ml_engine
                  mv python-ml-engine/dist/ml_engine.exe ml_engine/
            - run: npm install
            - run: npm run make
